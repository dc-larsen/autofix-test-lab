name: Socket Fix CI Test

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 min for testing

jobs:
  socket-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Socket CLI
        run: npm install -g @socketsecurity/cli

      - name: Configure Socket CLI
        run: |
          socket config set apiToken "$SOCKET_API_KEY"
          socket config set org david-s-github
          socket config set defaultOrg david-s-github
          socket config list
        env:
          SOCKET_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}

      - name: Run socket fix
        env:
          SOCKET_CLI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI: true
        run: |
          socket fix . --all --limit 3 --autopilot 2>&1 || true
          echo "--- socket fix complete ---"
          git diff --stat || true
